services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: psp
      POSTGRES_PASSWORD: psp
      POSTGRES_DB: psp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psp -d psp"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://psp:psp@postgres:5432/psp?sslmode=disable
      MIGRATIONS_DIR: /migrations
      SERVER_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
